apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "catalog.fullname" . }}
  labels:
    {{- include "catalog.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "catalog.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Istio ingressgateway → catalog REST API
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 8081
          protocol: TCP
    # order service → catalog (stock reserve/release calls)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: order
          podSelector:
            matchLabels:
              app.kubernetes.io/name: order
      ports:
        - port: 8081
          protocol: TCP
    # Prometheus scrape (Actuator)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # 基础设施组件 (都在 infra namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
      ports:
        - port: 5432   # PostgreSQL
          protocol: TCP
        - port: 6379   # Redis
          protocol: TCP
        - port: 39092  # Kafka (SASL_APP)
          protocol: TCP
        - port: 8081   # Schema Registry
          protocol: TCP
        - port: 4317   # OTel Collector (gRPC)
          protocol: TCP
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
