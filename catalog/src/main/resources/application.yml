spring:
    application:
        name: catalog
    threads:
        virtual:
            enabled: true
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/catalog}
        username: ${SPRING_DATASOURCE_USERNAME:bookstore}
        password: ${SPRING_DATASOURCE_PASSWORD:bookstore}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
    flyway:
        enabled: true
        locations: classpath:db/seedwork,classpath:db/migration
    data:
        redis:
            host: ${SPRING_DATA_REDIS_HOST:localhost}
            port: ${SPRING_DATA_REDIS_PORT:6379}
    kafka:
        bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        producer:
            key-serializer: org.apache.kafka.common.serialization.StringSerializer
            value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
        consumer:
            group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:catalog.order-events}
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
            auto-offset-reset: earliest
            enable-auto-commit: false
        listener:
            ack-mode: MANUAL_IMMEDIATE
        properties:
            schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8085}
            specific.avro.reader: true
            auto.register.schemas: false

outbox:
    relay:
        strategy: scheduler   # scheduler — polls outbox table on fixed interval; no Debezium dependency

server:
    port: 8081

springdoc:
    api-docs:
        path: /v3/api-docs
    swagger-ui:
        path: /swagger-ui.html

management:
    endpoints:
        web:
            exposure:
                include: health,prometheus
    metrics:
        export:
            prometheus:
                enabled: true

otel:
    exporter:
        otlp:
            endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
    service:
        name: ${OTEL_SERVICE_NAME:catalog}
