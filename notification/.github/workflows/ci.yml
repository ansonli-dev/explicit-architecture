name: CI

# notification-service repo — standard microservice pipeline
# Prerequisites:
#   - seedwork and shared-events published to GitHub Packages
#   - build.gradle.kts repositories block includes GitHub Packages (authenticated via GITHUB_TOKEN)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/notification

jobs:
  # ─── 1. test ──────────────────────────────────────────────────────────────────
  # Unit tests (domain/application, no Spring context) +
  # integration tests (Testcontainers: Postgres, Kafka)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: build/reports/tests/

  # ─── 2. contract ──────────────────────────────────────────────────────────────
  # notification has no synchronous HTTP dependencies — purely event-driven via Kafka.
  # Kafka Avro schema compatibility is enforced by Schema Registry (ADR-003), not Pact.
  # Structural placeholder to keep all service pipelines consistent.
  contract:
    name: Contract — N/A (event-driven via Kafka/Avro)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: No HTTP contract testing required
        run: echo "Kafka schema compatibility is handled by Avro Schema Registry (ADR-003)."

  # ─── 3. build ─────────────────────────────────────────────────────────────────
  build:
    name: Build Image
    needs: contract
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build and push image (Jib)
        run: |
          ./gradlew jib \
            -Djib.to.image="${IMAGE}:${{ github.sha }}" \
            -Djib.to.auth.username="${{ github.actor }}" \
            -Djib.to.auth.password="${{ secrets.GITHUB_TOKEN }}" \
            --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── 4. deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Test
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config

      - name: Helm upgrade
        run: |
          helm upgrade --install notification ./helm/ \
            --namespace bookstore \
            --set image.repository="${IMAGE}" \
            --set image.tag="${{ github.sha }}" \
            --wait --timeout 5m

      - name: Trigger E2E suite
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.E2E_DISPATCH_TOKEN }}
          repository: ${{ github.repository_owner }}/bookstore-infra
          event-type: service-deployed
          client-payload: |
            {"service": "notification", "version": "${{ github.sha }}"}
