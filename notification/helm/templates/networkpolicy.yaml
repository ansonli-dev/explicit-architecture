apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "notification.fullname" . }}
  labels:
    {{- include "notification.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "notification.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Istio ingressgateway → notification REST API (只读查询)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 8083
          protocol: TCP
    # Prometheus scrape (Actuator)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
          protocol: TCP
  egress:
    # 基础设施组件 (都在 bookstore namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: bookstore
      ports:
        - port: 5432   # PostgreSQL
          protocol: TCP
        - port: 39092  # Kafka (SASL_APP) — consume order events
          protocol: TCP
        - port: 8081   # Schema Registry
          protocol: TCP
        - port: 4317   # OTel Collector (gRPC)
          protocol: TCP
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
