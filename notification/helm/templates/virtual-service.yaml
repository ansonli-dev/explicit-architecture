apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ include "notification.fullname" . }}
  labels:
    {{- include "notification.labels" . | nindent 4 }}
spec:
  hosts:
    - {{ include "notification.fullname" . }}
  gateways:
    - infra/platform-gateway
    - mesh
  http:
    - timeout: 5s
      retries:
        attempts: 2
        perTryTimeout: 3s
        retryOn: gateway-error,connect-failure,retriable-4xx
      route:
        - destination:
            host: {{ include "notification.fullname" . }}
            port:
              number: {{ .Values.service.port }}
