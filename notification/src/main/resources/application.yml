spring:
    profiles:
        active: ${SPRING_PROFILES_ACTIVE:stub}
    application:
        name: notification
    threads:
        virtual:
            enabled: true
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/notification}
        username: ${SPRING_DATASOURCE_USERNAME:bookstore}
        password: ${SPRING_DATASOURCE_PASSWORD:bookstore}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: validate
        open-in-view: false
    flyway:
        enabled: true
        locations: classpath:db/seedwork,classpath:db/migration
    kafka:
        bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        consumer:
            group-id: ${SPRING_KAFKA_CONSUMER_GROUP_ID:notification.order-events}
            key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
            value-deserializer: io.confluent.kafka.serializers.KafkaAvroDeserializer
            auto-offset-reset: earliest
            enable-auto-commit: false
        listener:
            ack-mode: MANUAL_IMMEDIATE
        properties:
            schema.registry.url: ${SCHEMA_REGISTRY_URL:http://localhost:8085}
            specific.avro.reader: true
            auto.register.schemas: false

server:
    port: 8083

notification:
    email:
        log-only: ${NOTIFICATION_EMAIL_LOG_ONLY:true}

management:
    endpoints:
        web:
            exposure:
                include: health,prometheus
    metrics:
        export:
            prometheus:
                enabled: true

otel:
    exporter:
        otlp:
            endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
    service:
        name: ${OTEL_SERVICE_NAME:notification}
