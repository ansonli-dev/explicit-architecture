name: CI

# shared-events repo — Kafka event schema contracts (Avro)
# On every push to main: test → publish to GitHub Packages
# Service repos resolve this artifact from GitHub Packages in CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon

  # ─── 2. publish ───────────────────────────────────────────────────────────────
  # Publishes com.example:shared-events:0.1.0 to GitHub Packages.
  # Runs on main only — PRs only run tests.
  publish:
    name: Publish to GitHub Packages
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Publish artifact
        run: ./gradlew publishMavenPublicationToGitHubPackagesRepository --no-daemon
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
